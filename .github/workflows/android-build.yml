name: Android CI/CD

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'
  CASDOOR_ENDPOINT: ${{ secrets.CASDOOR_ENDPOINT }}
  CASDOOR_REDIRECT_URI: ${{ secrets.CASDOOR_REDIRECT_URI }}
  CASDOOR_CLIENT_SECRET: ${{ secrets.CASDOOR_CLIENT_SECRET }}
  CASDOOR_CLIENT_ID: ${{ secrets.CASDOOR_CLIENT_ID }}
  API_AC_SECRET: ${{ secrets.API_AC_SECRET }}
  CASDOOR_APP_NAME: ${{ secrets.CASDOOR_APP_NAME }}
  API_AC_KEY: ${{ secrets.API_AC_KEY }}


jobs:
  # ============================================
  # JOB 1: Build & Test
  # ============================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties if missing
        run: |
          if [ ! -f local.properties ]; then
            echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          fi

      - name: Generate Lint Baseline if missing
        run: |
          if [ ! -f app/lint-baseline.xml ]; then
            ./gradlew updateLintBaseline || echo "Lint baseline generation skipped"
          fi

      - name: Run Lint
        run: ./gradlew lintRelease

      - name: Run Tests
        run: ./gradlew test

      - name: Upload Lint Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-results
          path: app/build/reports/lint-results-*.html


  # ============================================
  # JOB 2: Build Release
  # ============================================
  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Read Android version
        id: version
        shell: bash
        run: |
          VERSION_NAME=""

          if [ -f app/build.gradle ]; then
            VERSION_NAME=$(grep -oP 'versionName\s*["'\'']\K[^"'\'']+' app/build.gradle | head -n 1 || true)
          fi

          if [ -z "$VERSION_NAME" ] && [ -f app/build.gradle.kts ]; then
            VERSION_NAME=$(grep -oP 'versionName\s*=\s*["'\'']\K[^"'\'']+' app/build.gradle.kts | head -n 1 || true)
          fi

          if [ -z "$VERSION_NAME" ]; then
            echo "Failed to read versionName from app/build.gradle or app/build.gradle.kts"
            exit 1
          fi

          VERSION_TAG="v${VERSION_NAME}-build.${{ github.run_number }}"

          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"

          echo "Resolved version_name: $VERSION_NAME"
          echo "Resolved version_tag: $VERSION_TAG"

      - name: Decode Keystore
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > app/release-keystore.jks

      - name: Build Release APK
        env:
          KEYSTORE_FILE: release-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Build Release AAB
        env:
          KEYSTORE_FILE: release-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Rename release artifacts
        id: rename
        shell: bash
        run: |
          mkdir -p release-assets

          VERSION_TAG="${{ steps.version.outputs.version_tag }}"

          APK_FILE=$(find app/build/outputs/apk/release -maxdepth 1 -type f -name "*.apk" | head -n 1)
          AAB_FILE=$(find app/build/outputs/bundle/release -maxdepth 1 -type f -name "*.aab" | head -n 1)

          if [ -z "$APK_FILE" ]; then
            echo "APK file not found"
            exit 1
          fi

          if [ -z "$AAB_FILE" ]; then
            echo "AAB file not found"
            exit 1
          fi

          NEW_APK="release-assets/Scoutify_${VERSION_TAG}_release.apk"
          NEW_AAB="release-assets/Scoutify_${VERSION_TAG}_release.aab"

          cp "$APK_FILE" "$NEW_APK"
          cp "$AAB_FILE" "$NEW_AAB"

          echo "apk_path=$NEW_APK" >> "$GITHUB_OUTPUT"
          echo "aab_path=$NEW_AAB" >> "$GITHUB_OUTPUT"

          ls -lah release-assets

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Scoutify-${{ steps.version.outputs.version_tag }}-apk
          path: ${{ steps.rename.outputs.apk_path }}
          retention-days: 30

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: Scoutify-${{ steps.version.outputs.version_tag }}-aab
          path: ${{ steps.rename.outputs.aab_path }}
          retention-days: 30

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version_tag }}
          name: Scoutify ${{ steps.version.outputs.version_tag }}
          draft: false
          files: |
            ${{ steps.rename.outputs.apk_path }}
            ${{ steps.rename.outputs.aab_path }}